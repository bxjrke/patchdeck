services:
  patchdeck:
    image: ghcr.io/bxjrke/patchdeck:0.3.5
    container_name: patchdeck
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Stores Patchdeck settings, service config, audit logs, registry cache, and icons.
      # Replace the host path with any persistent directory you want to use.
      - /your/own/path/patchdeck:/data
      # Lets Patchdeck inspect containers and run Docker Compose updates.
      - /var/run/docker.sock:/var/run/docker.sock
      # Optional: mount the host directory that contains the Compose files Patchdeck should update.
      # Use your real path here, and keep the same path inside the container when possible.
      # Example: if your Compose files live in /srv/compose, use /srv/compose:/srv/compose.
      - /your/compose/files:/your/compose/files
