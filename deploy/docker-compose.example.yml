services:
  patchdeck:
    image: ghcr.io/bxjrke/patchdeck:0.1.1
    container_name: patchdeck
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - patchdeck-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount the directories that contain the Compose files Patchdeck should update.
      # Keep the container path identical to the host path so Docker Compose labels
      # resolve correctly, for example /opt/stacks/media/compose.yaml.
      - /opt/stacks:/opt/stacks

volumes:
  patchdeck-data:
